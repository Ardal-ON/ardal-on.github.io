- title: Research Experience
  type: time_table
  contents:
    - title: Research Assistant
      institution: IMPACT Laboratory, University of Southern California
      year: Aug 2023 – present
      description:
        - Developed a graph-based planning framework for vision-language-action (VLA) models in long-horizon manipulation tasks.
        - Trained a high-accuracy vision model using CLIP features, achieving 95% accuracy on environmental key state prediction.
        - Fine-tuned a sentence transformer model to reach 98% instruction-to-task matching accuracy.
        - Trained a Transformer-based action model operating from vision and language inputs; validated on the CALVIN dataset.
        - Designed single and multi-agent workflows for mechanical systems engineering and MBSE modeler tasks.
        - Created a Visual Paradigm plugin to auto-generate SysML diagrams using a custom LLM agent.
        - Initiated a benchmark dataset to evaluate LLMs on SysML diagram design tasks.
        - Implemented a text extraction pipeline and integrated outputs into a RAG system for the agent.
    - title: Research Assistant
